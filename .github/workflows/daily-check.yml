name: daily-check

on:
  schedule:
    # GitHub Actions uses UTC. 08:00 UTC is 17:00 JST.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare temporary directory
        run: |
          sudo mkdir -p /private/tmp
          sudo chown "$(id -u):$(id -g)" /private/tmp

      - name: Snapshot ledgers for email diff
        run: |
          cp src/skills/market-distortion-scan/results/tracker.json /private/tmp/tracker-before.json
          cp src/skills/kasumi-yutai-yield/results/kasumi_yutai_ledger.json /private/tmp/yutai-before.json

      - name: Run distortion scan, ledger recording, and P/L check
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          RADIKABUNAVI_API_KEY: ${{ secrets.RADIKABUNAVI_API_KEY }}
        run: |
          set -o pipefail
          python3 src/skills/market-distortion-scan/daily_flow.py 2>&1 | tee daily_distortion.log

      - name: Run shareholder-benefit check
        run: |
          set -o pipefail
          python3 src/skills/kasumi-yutai-yield/run_daily.py 2>&1 | tee daily_yutai.log

      - name: Send daily result email
        if: always()
        continue-on-error: true
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/daily_email.py \
            --distortion-before /private/tmp/tracker-before.json \
            --distortion-after src/skills/market-distortion-scan/results/tracker.json \
            --yutai-before /private/tmp/yutai-before.json \
            --yutai-after src/skills/kasumi-yutai-yield/results/kasumi_yutai_ledger.json \
            --distortion-log daily_distortion.log \
            --yutai-log daily_yutai.log \
            --send

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-check-logs-${{ github.run_id }}
          path: |
            daily_distortion.log
            daily_yutai.log
          retention-days: 30

      - name: Commit updated ledgers and results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/skills/market-distortion-scan/results/ \
            src/skills/kasumi-yutai-yield/results/

          if git diff --cached --quiet; then
            echo "No result changes to commit"
          else
            git commit -m "daily-check: $(date -u +%Y-%m-%d)"
            git push
          fi
